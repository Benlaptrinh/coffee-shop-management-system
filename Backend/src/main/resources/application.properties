spring.application.name=demo
spring.profiles.default=dev

# JWT settings
jwt.secret=${JWT_SECRET:changeit_replace_this_with_secure_value}
jwt.expiration.seconds=${JWT_EXPIRATION_SECONDS:3600}

# CORS
app.cors.path-pattern=/api/**
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5174}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
app.cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}
app.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}

# Actuator exposure
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.endpoint.health.roles=ADMIN
